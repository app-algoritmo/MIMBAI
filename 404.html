<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIMBAI – Page not found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#f4f6fb;--surface:#fff;--border:#e2e6f0;--amber:#f5a623;--amber2:#e8940f;--amber-bg:#fff8ed;--text:#1a1d27;--text2:#4a5068;--muted:#8a91a8}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-mark{width:34px;height:34px;background:var(--amber);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#fff;box-shadow:0 2px 8px rgba(245,166,35,.3)}
    .logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--text)}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:56px 48px;text-align:center;max-width:500px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.07),0 8px 32px rgba(0,0,0,.05)}
    .error-code{font-family:'Syne',sans-serif;font-size:96px;font-weight:800;color:var(--amber);line-height:1;margin-bottom:8px;letter-spacing:-4px}
    .error-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:12px}
    .error-desc{font-size:15px;color:var(--text2);line-height:1.65;margin-bottom:32px}
    .btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--amber);color:#fff;text-decoration:none;padding:11px 24px;border-radius:9px;font-size:14px;font-weight:600;transition:background .2s;box-shadow:0 2px 8px rgba(245,166,35,.3)}
    .btn-primary:hover{background:var(--amber2)}
    .btn-secondary{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--text2);text-decoration:none;padding:10px 20px;border-radius:9px;font-size:14px;font-weight:500;border:1.5px solid var(--border);transition:all .2s}
    .btn-secondary:hover{border-color:var(--amber);color:var(--amber2)}
    .links{margin-top:32px;padding-top:24px;border-top:1px solid var(--border);display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
    .links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s}
    .links a:hover{color:var(--amber2)}
    /* search */
    .search-wrap{margin-bottom:28px}
    .search-input{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;background:var(--bg)}
    .search-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,166,35,.1)}
    .search-input::placeholder{color:var(--muted)}
    footer{padding:20px;text-align:center;font-size:12px;color:var(--muted)}
    footer a{color:var(--amber2);text-decoration:none}
    @media(max-width:480px){.card{padding:40px 24px}.error-code{font-size:72px}}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <div class="logo-mark">M</div>
    <span class="logo-text">MIMBAI</span>
  </a>
</nav>

<div class="main">
  <div class="card">
    <div class="error-code">404</div>
    <div class="error-title">Page not found</div>
    <div class="error-desc">The page you're looking for doesn't exist or has been moved. Try searching or go back to the MIMBAI platform.</div>

    <div class="search-wrap">
      <input class="search-input" type="text" id="searchInput" placeholder="Search MIMBAI pages..." onkeydown="handleSearch(event)"/>
    </div>

    <div class="btn-group">
      <a href="index.html" class="btn-primary">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to MIMBAI
      </a>
      <a href="contact.html" class="btn-secondary">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Contact support
      </a>
    </div>

    <div class="links">
      <a href="index.html">🧠 AI Platform</a>
      <a href="pricing.html">⭐ Pricing</a>
      <a href="docs.html">📖 Docs</a>
      <a href="about.html">🏢 About</a>
      <a href="contact.html">📧 Contact</a>
    </div>
  </div>
</div>

<footer>
  &lt;/&gt; <a href="https://digitalsolutions.no" target="_blank">Digital Solutions</a> · MIMBAI v1.0
</footer>

<script>
const pages = [
  { name: 'AI Platform', url: 'index.html', desc: 'Main MIMBAI chat interface' },
  { name: 'Pricing', url: 'pricing.html', desc: 'Plans & pricing' },
  { name: 'Documentation', url: 'docs.html', desc: 'How to use MIMBAI modules' },
  { name: 'About', url: 'about.html', desc: 'Technical stack and company info' },
  { name: 'Contact', url: 'contact.html', desc: 'Get in touch' },
  { name: 'Login', url: 'login.html', desc: 'Sign in or create account' },
  { name: 'Privacy Policy', url: 'privacy.html', desc: 'How we handle your data' },
  { name: 'Terms of Service', url: 'terms.html', desc: 'Terms and conditions' },
  { name: 'Cookie Policy', url: 'cookies.html', desc: 'Cookie preferences' },
];
function handleSearch(e) {
  if (e.key !== 'Enter') return;
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) return;
  const match = pages.find(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
  if (match) window.location.href = match.url;
  else alert('No page found for "' + q + '". Try: platform, pricing, docs, about, contact.');
}
// Auto-redirect after 30s
let countdown = 30;
const timer = setInterval(() => {
  countdown--;
  if (countdown <= 0) { clearInterval(timer); window.location.href = 'index.html'; }
}, 1000);
</script>
</body>
</html>
